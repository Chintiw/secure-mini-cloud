{% extends "base.html" %}
{% block title %}Forbidden{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="error-card fade-in" style="text-align: center;">
        <span class="auth-icon" aria-hidden="true" style="color: var(--error);">🛡️</span>
        <h1 class="display-md" style="margin-bottom: var(--space-xs);">Access denied.</h1>
        <p class="body-md" style="color: var(--body); margin-bottom: var(--space-xl);">You don't have permission to view this page.</p>
        <a href="{{ url_for('index') }}" class="btn-primary" style="display: inline-flex;">Back to Dashboard</a>
    </div>
</div>
{% endblock %}
