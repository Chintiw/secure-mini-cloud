{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-gradient-backdrop"></div>
<div class="auth-wrapper">
    <div class="auth-card fade-in">
        <div class="auth-header">
            <span class="auth-icon" aria-hidden="true">🔒</span>
            <h1 class="display-md" style="margin-bottom: var(--space-xs);">Welcome back.</h1>
            <p class="body-md" style="color: var(--body);">Sign in to your encrypted vault</p>
        </div>
        
        <form method="POST">
            <div class="form-group stagger-1">
                <label for="login-email">Email Address</label>
                <input type="email" id="login-email" name="email" class="form-input" required>
            </div>
            
            <div class="form-group stagger-2">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" name="password" class="form-input" required>
            </div>
            
            <div class="stagger-3" style="margin-top: var(--space-xl); margin-bottom: var(--space-md);">
                <button type="submit" class="btn-primary">Login Securely</button>
            </div>
        </form>
        
        <div class="stagger-4" style="text-align: center;">
            <a href="{{ url_for('register') }}" style="color: var(--link); font-size: 14px; text-decoration: none;">Don't have an account? Register here &rarr;</a>
        </div>
    </div>
</div>
{% endblock %}
