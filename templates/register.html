{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-gradient-backdrop"></div>
<div class="auth-wrapper">
    <div class="auth-card fade-in">
        <div class="auth-header">
            <span class="auth-icon" aria-hidden="true">🔒</span>
            <h1 class="display-md" style="margin-bottom: var(--space-xs);">Create your vault.</h1>
            <p class="body-md" style="color: var(--body);">Your files, encrypted and isolated</p>
        </div>
        
        <form method="POST">
            <div class="form-group stagger-1">
                <label for="reg-username">Username</label>
                <input type="text" id="reg-username" name="username" class="form-input" required>
            </div>

            <div class="form-group stagger-2">
                <label for="reg-email">Email Address</label>
                <input type="email" id="reg-email" name="email" class="form-input" required>
            </div>
            
            <div class="form-group stagger-3">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" name="password" class="form-input" required>
            </div>
            
            <div class="stagger-4" style="margin-top: var(--space-xl); margin-bottom: var(--space-md);">
                <button type="submit" class="btn-primary">Create Account</button>
            </div>
        </form>
        
        <div class="stagger-4" style="text-align: center;">
            <a href="{{ url_for('login') }}" style="color: var(--link); font-size: 14px; text-decoration: none;">Already have an account? Login here &rarr;</a>
        </div>
    </div>
</div>
{% endblock %}
